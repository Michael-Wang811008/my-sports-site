<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日体育精选 - 历史归档</title>
    <style>
        :root {
            --green: #006633;
            --purple: #663399;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #f0f4f0 0%, #e8f0e8 100%);
            min-height: 100vh;
        }
        header {
            background: white;
            padding: 28px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            text-align: center;
            border-top: 5px solid var(--green);
        }
        h1 { color: var(--green); margin-bottom: 8px; }
        .subtitle { color: #666; font-size: 14px; }
        .archive-list {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        .archive-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid #e0e0e0;
        }
        .archive-item:last-child { border-bottom: none; }
        .archive-item:hover { background: #f5f7f6; }
        .archive-link {
            color: var(--green);
            text-decoration: none;
            font-weight: 600;
        }
        .archive-link:hover { text-decoration: underline; }
        .date-badge {
            background: #e8f5ec;
            color: var(--green);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .actions {
            margin-top: 20px;
            text-align: center;
        }
        .btn {
            display: inline-block;
            background: var(--green);
            color: white;
            padding: 10px 24px;
            border-radius: 18px;
            text-decoration: none;
            margin: 5px;
            font-weight: 600;
        }
        .btn-purple { background: var(--purple); }
    </style>
</head>
<body>
    <header>
        <h1>📰 每日体育精选</h1>
        <p class="subtitle">历史归档 | 耐力体育 · 深度观察 · 每日更新</p>
    </header>
    
    <div class="archive-list" id="archive-list">
        <h2 style="color: var(--green); margin-bottom: 16px;">📂 归档文件</h2>
        <p style="color: #666; margin-bottom: 20px;">加载中...</p>
    </div>
    
    <div class="actions">
        <a href="index.html" class="btn">📰 查看最新版本</a>
        <a href="README.md" class="btn btn-purple">📖 使用说明</a>
    </div>
    
    <script>
        // 自动扫描并列出所有归档文件
        const archiveFiles = [
            { date: '2026-03-19', file: 'sports-digest-2026-03-19.html' },
            { date: '2026-03-17', file: 'sports-digest-2026-03-17.html' }
        ];
        
        const listDiv = document.getElementById('archive-list');
        
        if (archiveFiles.length === 0) {
            listDiv.innerHTML = '<p style="color: #666;">暂无归档文件</p>';
        } else {
            let html = '<h2 style="color: var(--green); margin-bottom: 16px;">📂 归档文件</h2>';
            archiveFiles.sort((a, b) => b.date.localeCompare(a.date)).forEach(item => {
                html += `
                    <div class="archive-item">
                        <a href="${item.file}" class="archive-link">📄 ${item.file}</a>
                        <span class="date-badge">${item.date}</span>
                    </div>
                `;
            });
            listDiv.innerHTML = html;
        }
    </script>
</body>
</html>
